<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puck | ميرشندايزر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B2E6B;
    --navy-deep:#081F4D;
    --sky:#3DA5E0;
    --sky-light:#BFE3F7;
    --sun:#F6A623;
    --leaf:#6FBE44;
    --ink:#10264D;
    --paper:#F5F9FD;
    --white:#FFFFFF;
    --line:#DCE7F3;
    --danger:#D64545;
    --radius-lg:22px;
    --radius-md:14px;
    --radius-sm:9px;
    --font-body:'Tajawal', sans-serif;
    --font-display:'Cairo', sans-serif;
    --user-font-size:16px;
    --user-font-weight:400;
    --shadow-soft:0 10px 30px rgba(11,46,107,0.10);
    --shadow-card:0 6px 18px rgba(11,46,107,0.12);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-body);
    font-size:var(--user-font-size);
    font-weight:var(--user-font-weight);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    position:relative;
    overflow-x:hidden;
  }

  /* ---------- decorative daisy signature ---------- */
  .daisy{ display:inline-block; position:relative; width:1em; height:1em; }
  .daisy svg{ width:100%; height:100%; display:block; }

  .bg-daisies{
    position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
  }
  .bg-daisies svg{ position:absolute; opacity:0.05; }

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:40;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px;
    background:linear-gradient(180deg, rgba(245,249,253,0.97), rgba(245,249,253,0.88));
    backdrop-filter:blur(6px);
  }
  .gear-btn{
    width:42px; height:42px; border-radius:50%;
    border:1.5px solid var(--line); background:var(--white);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; box-shadow:var(--shadow-card);
    transition:transform .2s ease, border-color .2s ease;
    color:var(--navy);
  }
  .gear-btn:hover{ transform:rotate(35deg); border-color:var(--sky); }
  .back-btn{
    display:flex; align-items:center; gap:6px;
    border:none; background:transparent; color:var(--navy);
    font-family:var(--font-display); font-weight:700; font-size:15px;
    cursor:pointer; padding:8px 4px;
  }
  .back-btn svg{ width:20px; height:20px; }
  .topbar-spacer{ width:42px; }

  /* ---------- hero / home ---------- */
  .hero{
    position:relative; z-index:1;
    padding:10px 20px 30px;
    text-align:center;
  }
  .logo-wrap{
    display:flex; justify-content:center; margin:4px auto 2px;
  }
  .logo-wrap img{ width:min(58vw, 230px); height:auto; filter:drop-shadow(0 12px 22px rgba(11,46,107,0.18)); }
  .hero-eyebrow{
    font-family:var(--font-display); font-weight:900; letter-spacing:.4px;
    color:var(--navy); font-size:19px; margin:0 0 2px;
    text-shadow:0 1px 0 rgba(255,255,255,0.6);
  }
  .hero-title{
    font-family:var(--font-display); font-weight:900;
    color:var(--navy-deep); font-size:22px; margin:6px 0 0;
  }

  /* ---------- language toggle (compact, in topbar) ---------- */
  .lang-toggle{
    display:inline-flex; align-items:center; gap:2px;
    background:var(--white); border:1.5px solid var(--line); border-radius:9px; padding:2px;
    box-shadow:var(--shadow-card);
  }
  .lang-toggle button{
    border:none; background:transparent; cursor:pointer; padding:5px 10px; border-radius:7px;
    font-family:var(--font-display); font-weight:700; font-size:10.5px; color:var(--navy);
    transition:background .15s ease, color .15s ease;
  }
  .lang-toggle button.active{ background:var(--navy); color:#fff; }

  /* ---------- per-branch layout toggle (small, on branch page) ---------- */
  .branch-layout-row{ margin:0 auto 22px; max-width:260px; }
  .branch-layout-row .layout-choice-row.small{ gap:8px; }
  .layout-opt.small{ padding:8px 6px; border-radius:10px; }
  .layout-opt.small .preview{ margin-bottom:5px; }
  .layout-opt.small .preview .bar{ width:14px; height:20px; border-radius:3px; }
  .layout-opt.small .lbl{ font-size:10.5px; }

  /* ---------- quick edit (from public product cards) ---------- */
  .edit-badge-btn{
    position:absolute; top:14px; right:14px; z-index:2;
    width:32px; height:32px; border-radius:50%;
    background:var(--white); border:1.5px solid var(--sky); color:var(--sky);
    display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:var(--shadow-card);
  }
  .admin-back-btn{
    display:flex; align-items:center; gap:6px; border:1.5px solid var(--line); background:var(--white);
    color:var(--navy); font-family:var(--font-display); font-weight:700; font-size:13px;
    cursor:pointer; padding:8px 14px; border-radius:10px; margin-inline-end:8px;
  }

  .section-label{
    display:flex; align-items:center; gap:10px;
    justify-content:center;
    font-family:var(--font-display); font-weight:700;
    color:var(--navy); font-size:15px;
    margin:26px 0 16px;
  }
  .section-label .line{ height:1px; width:34px; background:var(--line); }

  /* ---------- branch grid ---------- */
  .branch-grid{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
    gap:14px; max-width:760px; margin:0 auto; padding:0 20px 40px;
  }
  .branch-card{
    background:var(--white); border:1px solid var(--line);
    border-radius:var(--radius-md); padding:20px 12px;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    cursor:pointer; box-shadow:var(--shadow-card);
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    position:relative; overflow:hidden;
  }
  .branch-card:hover{ transform:translateY(-4px); box-shadow:0 14px 28px rgba(11,46,107,0.16); border-color:var(--sky-light); }
  .branch-card .daisy{ width:34px; height:34px; color:var(--sky); }
  .branch-card .branch-icon-img{ width:40px; height:40px; object-fit:cover; border-radius:10px; }
  .branch-card .branch-icon-emoji{ font-size:32px; line-height:1; }
  .branch-card .branch-icon-color{ width:34px; height:34px; border-radius:50%; }
  .branch-card .name{ font-family:var(--font-display); font-weight:800; font-size:16px; color:var(--navy-deep); }
  .branch-card .count{ font-size:12px; color:#7C93B8; }
  .notices{ display:flex; flex-direction:column; gap:3px; width:100%; align-items:center; }
  .notice-line{ font-size:11px; line-height:1.4; word-break:break-word; text-align:center; }
  .branch-empty{
    max-width:760px; margin:0 auto; padding:40px 20px; text-align:center; color:#7C93B8; font-size:14px;
  }

  /* ---------- product grid (public) ---------- */
  .products-wrap{ max-width:900px; margin:0 auto; padding:8px 20px 60px; position:relative; z-index:1; }
  .branch-title-row{ text-align:center; margin-bottom:22px; }
  .branch-title-row h2{ font-family:var(--font-display); font-weight:900; color:var(--navy-deep); font-size:24px; margin:0 0 4px; }
  .branch-title-row p{ color:#7C93B8; font-size:13px; margin:0; }
  .branch-title-row .notices{ margin:8px 0 2px; }
  .branch-title-row .notice-line{ font-size:12.5px; font-weight:700; }
  .notices-edit-link{
    display:inline-flex; align-items:center; gap:5px; border:none; background:transparent;
    color:var(--sky); font-family:var(--font-display); font-weight:700; font-size:11.5px;
    cursor:pointer; padding:4px 8px; margin-top:4px;
  }

  .product-grid{ display:grid; gap:18px; }
  .product-grid.cols-1{ grid-template-columns:1fr; max-width:420px; margin:0 auto; }
  .product-grid.cols-2{ grid-template-columns:repeat(2,1fr); }
  @media (max-width:520px){ .product-grid{ gap:10px; } .product-media{ padding:10px 10px 0; } .product-body{ padding:10px 10px 14px; } .weight-badge{ font-size:11px; padding:5px 8px; } .product-name{ font-size:13px; margin-bottom:8px; } .date-box{ padding:6px 4px; } .date-box .val{ font-size:11px; } .date-box .lbl{ font-size:10px; } }

  .product-card{
    background:var(--white); border-radius:var(--radius-lg);
    box-shadow:var(--shadow-soft); overflow:hidden; position:relative;
    border:1px solid var(--line);
  }
  .product-media{ position:relative; padding:18px 18px 0; }
  .product-media img{
    width:100%; aspect-ratio:1/1; object-fit:contain; display:block;
    filter:drop-shadow(0 8px 14px rgba(11,46,107,0.12));
  }
  .weight-badge{
    position:absolute; top:14px; left:14px;
    background:var(--paper); border:1px solid var(--line);
    color:var(--navy-deep); font-family:var(--font-display); font-weight:800;
    font-size:13px; padding:7px 12px; border-radius:10px;
  }
  .product-body{ padding:14px 18px 20px; }
  .product-name{ font-family:var(--font-display); font-weight:700; font-size:15px; color:var(--navy-deep); text-align:center; margin-bottom:14px; }
  .date-row{ display:flex; gap:10px; }
  .date-box{
    flex:1; background:var(--paper); border:1px solid var(--line);
    border-radius:10px; padding:8px 10px; text-align:center;
  }
  .date-box .lbl{ display:flex; align-items:center; justify-content:center; gap:5px; color:var(--sky); font-size:11.5px; font-weight:700; margin-bottom:3px; }
  .date-box .lbl svg{ width:13px; height:13px; }
  .date-box .val{ font-size:13px; font-weight:700; color:var(--navy-deep); }

  /* ---------- modals / overlays ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(8,20,50,0.46);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:16px; backdrop-filter:blur(2px);
  }
  .modal{
    background:var(--white); border-radius:20px; width:100%; max-width:380px;
    padding:26px 24px; box-shadow:0 24px 60px rgba(8,20,50,0.35);
    position:relative;
  }
  .modal h3{ font-family:var(--font-display); font-weight:800; color:var(--navy-deep); margin:0 0 4px; font-size:18px; text-align:center; }
  .modal .hint{ text-align:center; color:#7C93B8; font-size:12.5px; margin:0 0 18px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; font-weight:700; color:var(--navy); margin-bottom:6px; }
  .field input, .field select{
    width:100%; padding:11px 12px; border-radius:10px; border:1.5px solid var(--line);
    font-family:var(--font-body); font-size:14px; background:var(--paper); color:var(--ink);
  }
  .field input:focus, .field select:focus{ outline:none; border-color:var(--sky); }
  .btn{
    border:none; border-radius:11px; padding:12px 16px; font-family:var(--font-display);
    font-weight:700; font-size:14.5px; cursor:pointer; transition:filter .15s ease, transform .1s ease;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn:active{ transform:scale(.97); }
  .btn-primary{ background:var(--navy); color:#fff; width:100%; }
  .btn-primary:hover{ filter:brightness(1.12); }
  .btn-ghost{ background:transparent; color:var(--navy); border:1.5px solid var(--line); }
  .btn-danger{ background:#FCEAEA; color:var(--danger); }
  .btn-small{ padding:8px 12px; font-size:13px; border-radius:9px; }
  .error-msg{ background:#FCEAEA; color:var(--danger); font-size:12.5px; padding:9px 12px; border-radius:9px; margin-bottom:12px; text-align:center; }
  .success-msg{ background:#EAF7E8; color:#2E7D32; font-size:12.5px; padding:9px 12px; border-radius:9px; margin-bottom:12px; text-align:center; }
  .close-x{
    position:absolute; top:14px; left:14px; width:30px; height:30px; border-radius:50%;
    border:none; background:var(--paper); color:var(--navy); cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }

  /* ---------- admin panel ---------- */
  .admin-overlay{ position:fixed; inset:0; background:var(--paper); z-index:90; overflow-y:auto; }
  .admin-shell{ max-width:980px; margin:0 auto; padding:0 0 60px; }
  .admin-top{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 22px; position:sticky; top:0; background:var(--paper); z-index:5;
    border-bottom:1px solid var(--line);
  }
  .admin-top h2{ font-family:var(--font-display); font-weight:900; color:var(--navy-deep); font-size:19px; margin:0; display:flex; align-items:center; gap:8px; }
  .admin-tabs{
    display:flex; gap:8px; padding:16px 22px 0; flex-wrap:wrap;
  }
  .admin-tab{
    padding:9px 16px; border-radius:10px; border:1.5px solid var(--line); background:var(--white);
    color:var(--navy); font-family:var(--font-display); font-weight:700; font-size:13.5px; cursor:pointer;
  }
  .admin-tab.active{ background:var(--navy); color:#fff; border-color:var(--navy); }
  .admin-content{ padding:22px; }
  .panel-card{
    background:var(--white); border:1px solid var(--line); border-radius:16px; padding:20px;
    margin-bottom:16px; box-shadow:var(--shadow-card);
  }
  .panel-card h4{ font-family:var(--font-display); font-weight:800; color:var(--navy-deep); font-size:15px; margin:0 0 14px; display:flex; align-items:center; gap:8px; }

  .chip-grid{ display:flex; flex-wrap:wrap; gap:10px; }
  .chip{
    display:flex; align-items:center; gap:8px; background:var(--paper); border:1.5px solid var(--line);
    border-radius:12px; padding:9px 12px; font-size:13.5px; font-weight:700; color:var(--navy-deep);
  }
  .chip button{ border:none; background:transparent; color:#B5522F; cursor:pointer; font-size:14px; line-height:1; padding:0; }
  .plus-tile{
    display:flex; align-items:center; gap:6px; border:1.5px dashed var(--sky); color:var(--sky);
    border-radius:12px; padding:9px 14px; font-size:13.5px; font-weight:700; cursor:pointer; background:transparent;
  }
  .inline-add-row{ display:flex; gap:8px; margin-top:12px; }
  .inline-add-row input{ flex:1; padding:10px 12px; border-radius:10px; border:1.5px solid var(--line); font-family:var(--font-body); }

  .chip-mini-btn{
    border:1.5px solid var(--line); background:var(--white); border-radius:8px; width:26px; height:26px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--navy); font-size:13px; padding:0;
  }
  .icon-choice-row{ display:flex; gap:8px; margin-bottom:14px; }
  .icon-choice-row button{
    flex:1; padding:8px; border-radius:10px; border:1.5px solid var(--line); background:var(--white);
    font-family:var(--font-display); font-weight:700; font-size:12px; color:var(--navy); cursor:pointer;
  }
  .icon-choice-row button.active{ background:var(--navy); color:#fff; border-color:var(--navy); }
  .emoji-grid{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; max-height:160px; overflow-y:auto; }
  .emoji-grid button{
    width:38px; height:38px; font-size:19px; border-radius:9px; border:1.5px solid var(--line);
    background:var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .emoji-grid button.active{ border-color:var(--sky); background:#F0F8FD; }
  .color-swatch-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
  .color-swatch-row button{
    width:32px; height:32px; border-radius:50%; border:2px solid var(--line); cursor:pointer; padding:0;
  }
  .color-swatch-row button.active{ border-color:var(--navy-deep); box-shadow:0 0 0 2px var(--white) inset; }

  .notice-row{
    display:flex; align-items:center; gap:10px; padding:9px 12px; border:1.5px solid var(--line);
    border-radius:12px; margin-bottom:8px; background:var(--paper);
  }
  .notice-row .swatch{ width:14px; height:14px; border-radius:50%; flex-shrink:0; }
  .notice-row .txt{ flex:1; font-size:13px; word-break:break-word; }
  .notice-row button{ border:none; background:transparent; color:#B5522F; cursor:pointer; flex-shrink:0; }
  .notice-form{ display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; align-items:center; }
  .notice-form input[type="text"]{ flex:1; min-width:140px; padding:9px 11px; border-radius:10px; border:1.5px solid var(--line); font-family:var(--font-body); }
  .notice-form input[type="color"]{ width:38px; height:38px; border:1.5px solid var(--line); border-radius:9px; padding:2px; cursor:pointer; }
  .notice-form input[type="number"]{ width:64px; padding:9px 6px; border-radius:10px; border:1.5px solid var(--line); text-align:center; }

  .branch-select-row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .branch-select-row button{
    padding:8px 14px; border-radius:9px; border:1.5px solid var(--line); background:var(--white);
    font-family:var(--font-display); font-weight:700; font-size:13px; color:var(--navy); cursor:pointer;
  }
  .branch-select-row button.active{ background:var(--sky); border-color:var(--sky); color:#fff; }

  .admin-product-row{
    display:grid; grid-template-columns:88px 1fr; gap:14px; padding:14px; border:1px solid var(--line);
    border-radius:14px; margin-bottom:12px; align-items:start; background:var(--paper);
  }
  .thumb-upload{
    width:88px; height:88px; border-radius:12px; overflow:hidden; position:relative; cursor:pointer;
    border:1.5px dashed var(--line); background:var(--white);
  }
  .thumb-upload img{ width:100%; height:100%; object-fit:cover; }
  .thumb-upload input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
  .thumb-upload .up-hint{ position:absolute; bottom:0; inset-inline:0; background:rgba(11,46,107,0.8); color:#fff; font-size:9.5px; text-align:center; padding:2px 0; }
  .row-fields{ display:flex; flex-direction:column; gap:8px; }
  .row-fields .line1{ display:flex; gap:8px; }
  .row-fields .line1 input[type=text]{ flex:2; }
  .row-fields .weight-inputs{ display:flex; gap:6px; flex:1; }
  .row-fields .weight-inputs input{ width:60%; }
  .row-fields .weight-inputs select{ width:40%; }
  .row-fields input, .row-fields select{
    padding:8px 10px; border-radius:8px; border:1.5px solid var(--line); font-family:var(--font-body); font-size:13px; background:#fff;
  }
  .date-line{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .date-line .grp{ display:flex; align-items:center; gap:6px; }
  .date-line .grp span{ font-size:11.5px; color:#7C93B8; font-weight:700; }
  .date-line select{ padding:6px 8px; font-size:12.5px; }
  .row-actions{ display:flex; justify-content:flex-end; margin-top:6px; }
  .add-product-tile{
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    padding:16px; border:2px dashed var(--sky); border-radius:14px; color:var(--sky);
    font-family:var(--font-display); font-weight:800; cursor:pointer; background:transparent; font-size:14px;
  }

  /* ---------- add-product choice modal ---------- */
  .add-choice-row{ display:flex; gap:14px; margin-top:6px; }
  .add-choice-opt{
    flex:1; border:2px solid var(--line); border-radius:14px; padding:18px 10px; text-align:center;
    cursor:pointer; background:var(--paper); transition:border-color .15s ease, background .15s ease;
  }
  .add-choice-opt:hover{ border-color:var(--sky); background:#F0F8FD; }
  .add-choice-opt .ico{ color:var(--sky); margin-bottom:8px; }
  .add-choice-opt .lbl{ font-family:var(--font-display); font-weight:800; color:var(--navy-deep); font-size:14px; }
  .add-choice-opt .sub{ color:#7C93B8; font-size:11.5px; margin-top:4px; }

  /* ---------- previous products picker ---------- */
  .modal.wide{ max-width:480px; }
  .prev-search{ position:relative; margin-bottom:14px; }
  .prev-search svg{ position:absolute; top:50%; right:12px; transform:translateY(-50%); color:#7C93B8; }
  .prev-search input{
    width:100%; padding:11px 38px 11px 12px; border-radius:10px; border:1.5px solid var(--line);
    font-family:var(--font-body); font-size:14px; background:var(--paper); color:var(--ink);
  }
  .prev-list{ max-height:320px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
  .prev-item{
    display:flex; align-items:center; gap:10px; padding:8px 10px; border:1.5px solid var(--line);
    border-radius:12px; background:var(--white);
  }
  .prev-item img{ width:40px; height:40px; object-fit:contain; border-radius:8px; background:var(--paper); flex-shrink:0; }
  .prev-item .info{ flex:1; min-width:0; }
  .prev-item .info .n{ font-family:var(--font-display); font-weight:700; font-size:13.5px; color:var(--navy-deep); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .prev-item .info .w{ font-size:11.5px; color:#7C93B8; }
  .prev-pick-btn{
    width:32px; height:32px; border-radius:50%; border:1.5px solid var(--sky); background:var(--white);
    color:var(--sky); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
    transition:background .15s ease, color .15s ease;
  }
  .prev-pick-btn.picked{ background:var(--leaf); border-color:var(--leaf); color:#fff; }

  .users-table{ width:100%; border-collapse:collapse; }
  .users-table th{ text-align:right; font-size:12px; color:#7C93B8; font-weight:700; padding:6px 8px; border-bottom:1px solid var(--line); }
  .users-table td{ padding:10px 8px; border-bottom:1px solid var(--line); font-size:13.5px; }
  .status-pill{ padding:3px 10px; border-radius:20px; font-size:11.5px; font-weight:700; }
  .status-pill.active{ background:#EAF7E8; color:#2E7D32; }
  .status-pill.pending{ background:#FFF3E0; color:#B5722F; }

  .add-user-form{ display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
  .add-user-form input{ flex:1; min-width:120px; padding:10px 12px; border-radius:10px; border:1.5px solid var(--line); }

  .font-select-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:560px){ .font-select-grid{ grid-template-columns:1fr; } }
  .range-row{ display:flex; align-items:center; gap:12px; }
  .range-row input[type=range]{ flex:1; accent-color:var(--sky); }
  .custom-font-list{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }

  .layout-choice-row{ display:flex; gap:14px; }
  .layout-opt{
    flex:1; border:2px solid var(--line); border-radius:14px; padding:14px; cursor:pointer; text-align:center;
  }
  .layout-opt.active{ border-color:var(--sky); background:#F0F8FD; }
  .layout-opt .preview{ display:flex; gap:5px; justify-content:center; margin-bottom:10px; }
  .layout-opt .preview .bar{ width:22px; height:34px; border-radius:5px; background:var(--sky-light); }
  .layout-opt .lbl{ font-family:var(--font-display); font-weight:700; font-size:13px; color:var(--navy-deep); }

  .logout-btn{ background:transparent; border:none; color:#B5522F; font-family:var(--font-display); font-weight:700; font-size:13.5px; cursor:pointer; display:flex; align-items:center; gap:5px; }

  /* ---------- expiry alert states ---------- */
  @keyframes pulseAlert{
    0%,100%{ box-shadow:0 0 0 0 rgba(214,69,69,0.38); }
    50%{ box-shadow:0 0 0 9px rgba(214,69,69,0); }
  }
  .product-card.alert-near{ border:2px solid var(--danger); animation:pulseAlert 1.7s ease-in-out infinite; }
  .product-card.alert-expired{ border:2px solid #6E1B1B; }
  .alert-banner{
    background:var(--danger); color:#fff; font-size:12.5px; font-weight:800;
    text-align:center; padding:8px 10px; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .alert-banner.expired{ background:#6E1B1B; }
  .alert-banner svg{ width:14px; height:14px; flex-shrink:0; }

  /* ---------- whatsapp fab ---------- */
  .wa-fab{
    position:fixed; bottom:22px; inset-inline-start:20px; z-index:60;
    width:54px; height:54px; border-radius:50%; border:none; cursor:pointer;
    background:#25D366; color:#fff; box-shadow:0 10px 24px rgba(37,211,102,0.42);
    display:flex; align-items:center; justify-content:center; transition:transform .15s ease;
  }
  .wa-fab:hover{ transform:translateY(-3px); }
  .wa-fab svg{ width:26px; height:26px; }

  .wa-subs-table{ width:100%; border-collapse:collapse; margin-top:8px; }
  .wa-subs-table th{ text-align:right; font-size:12px; color:#7C93B8; font-weight:700; padding:6px 8px; border-bottom:1px solid var(--line); }
  .wa-subs-table td{ padding:9px 8px; border-bottom:1px solid var(--line); font-size:13px; }
  .alert-item{
    display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
    padding:12px; border:1px solid var(--line); border-radius:12px; margin-bottom:10px; background:var(--paper);
  }
  .alert-item .info{ font-size:13px; }
  .alert-item .info b{ color:var(--navy-deep); }
  .alert-item .days-pill{ font-size:11.5px; font-weight:800; padding:3px 10px; border-radius:20px; }
  .alert-item .days-pill.near{ background:#FFF3E0; color:#B5722F; }
  .alert-item .days-pill.expired{ background:#FCEAEA; color:var(--danger); }
  .wa-send-btn{ background:#25D366; color:#fff; border:none; padding:8px 14px; border-radius:9px; font-family:var(--font-display); font-weight:700; font-size:12.5px; cursor:pointer; display:flex; align-items:center; gap:6px; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--navy-deep); color:#fff; padding:11px 22px; border-radius:12px; font-size:13.5px;
    font-family:var(--font-display); font-weight:700; z-index:200; box-shadow:0 10px 24px rgba(0,0,0,0.25);
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-4px); }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:8px; }
</style>
</head>

/* =========================================================
   STORAGE HELPERS  (Supabase key-value table "puck_kv" -> shared by whole team)
========================================================= */
const supabaseClient = (window.SUPABASE_URL && window.SUPABASE_ANON_KEY)
  ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)
  : null;

async function storageGet(key, fallback){
  if(!supabaseClient){ console.error("Supabase غير مهيأ - راجع config.js"); return fallback; }
  try{
    const { data, error } = await supabaseClient.from("puck_kv").select("value").eq("key", key).maybeSingle();
    if(error || !data || data.value === undefined || data.value === null) return fallback;
    return data.value;
  }catch(e){ console.error("storage get failed", key, e); return fallback; }
}
async function storageSet(key, value){
  if(!supabaseClient){ console.error("Supabase غير مهيأ - راجع config.js"); return; }
  try{
    await supabaseClient.from("puck_kv").upsert({ key, value, updated_at: new Date().toISOString() });
  }catch(e){ console.error("storage set failed", key, e); }
}

async function loadAll(){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

  state.branches = await storageGet("puck:branches", null);
  if(state.branches === null){ state.branches = defaultBranches(); await storageSet("puck:branches", state.branches); }

  state.products = await storageGet("puck:products", null);
  if(state.products === null){ state.products = defaultProducts(); await storageSet("puck:products", state.products); }

  state.users = await storageGet("puck:users", null);
  if(state.users === null){ state.users = defaultUsers(); await storageSet("puck:users", state.users); }

  state.settings = await storageGet("puck:settings", null);
  if(state.settings === null){ state.settings = { fontFamily: "'Tajawal', sans-serif", fontSize: 16, fontWeight: 400, columns: 2, customFonts: [] }; await storageSet("puck:settings", state.settings); }

  state.subscribers = await storageGet("puck:subscribers", null);
  if(state.subscribers === null){ state.subscribers = []; await storageSet("puck:subscribers", state.subscribers); }

  applySettings();
  (state.settings.customFonts || []).forEach(f => registerFont(f.name, f.dataUrl));
  renderBgDaisies();
  document.getElementById("waFab").innerHTML = ICON.chat;
  document.getElementById("waFab").title = t("wa_fab_title");
  document.getElementById("waFab").onclick = openSubscribeModal;
  render();
}

/* =========================================================
   EXPIRY ALERT LOGIC
========================================================= */
function daysUntilExpiry(p){
  const end = new Date(YEAR, (p.endMonth||1)-1, p.endDay||1);
  const now = new Date();
  const today = new Date(YEAR, now.getMonth(), now.getDate());
  return Math.round((end - today) / 86400000);
}
function expiryStatus(p){
  const days = daysUntilExpiry(p);
  const threshold = p.alertDays || 0;
  if(days < 0) return { status:"expired", days };
  if(days <= threshold) return { status:"near", days };
  return { status:"ok", days };
}
function buildWaMessage(p, branchName, info){
  if(info.status === "expired"){
    return `تنبيه بوك: انتهت مدة عرض "${p.name}" في فرع ${branchName}. الرجاء المتابعة والإزالة إذا لزم الأمر.`;
  }
  const dateStr = `${String(p.endDay).padStart(2,'0')} ${curMonths()[p.endMonth-1]} ${YEAR}`;
  return `تنبيه بوك: منتج "${p.name}" في فرع ${branchName} على وشك الانتهاء خلال ${info.days} ${info.days===1?'يوم':'أيام'} (بتاريخ ${dateStr}). الرجاء المتابعة.`;
}
function waLink(phone, text){
  const digits = String(phone).replace(/[^0-9]/g,"");
  return `https://wa.me/${digits}?text=${encodeURIComponent(text)}`;
}

function applySettings(){
  document.documentElement.style.setProperty("--font-body", state.settings.fontFamily);
  document.documentElement.style.setProperty("--user-font-size", state.settings.fontSize + "px");
  document.documentElement.style.setProperty("--user-font-weight", state.settings.fontWeight);
}

function registerFont(name, dataUrl){
  try{
    const f = new FontFace(name, `url(${dataUrl})`);
    f.load().then(loaded => { document.fonts.add(loaded); }).catch(e=>console.error("font load failed", e));
  }catch(e){ console.error(e); }
}

let toastTimer = null;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 2200);
}

function renderBgDaisies(){
  const positions = [[6,10,120],[88,20,90],[14,78,140],[80,72,110],[46,4,70],[50,92,80]];
  document.getElementById("bgDaisies").innerHTML = positions.map(p =>
    `<svg style="left:${p[0]}%; top:${p[1]}%; width:${p[2]}px; height:${p[2]}px; color:var(--navy);" viewBox="0 0 100 100">${ICON.daisy.match(/<g.*?<\/g>/s)[0]}</svg>`
  ).join("");
}

function renderBranchIconHtml(b){
  const icon = branchIcon(b);
  if(icon.type === "image" && icon.value) return `<img class="branch-icon-img" src="${icon.value}" alt="">`;
  if(icon.type === "emoji" && icon.value) return `<div class="branch-icon-emoji">${escapeHtml(icon.value)}</div>`;
  if(icon.type === "color" && icon.value) return `<div class="branch-icon-color" style="background:${escapeHtml(icon.value)};"></div>`;
  return `<div class="daisy">${ICON.daisy}</div>`;
}

function renderBranchIconHtmlSmall(b){
  const icon = branchIcon(b);
  if(icon.type === "image" && icon.value) return `<img src="${icon.value}" style="width:16px;height:16px;object-fit:cover;border-radius:4px;">`;
  if(icon.type === "emoji" && icon.value) return `<span style="font-size:14px;line-height:1;">${escapeHtml(icon.value)}</span>`;
  if(icon.type === "color" && icon.value) return `<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${escapeHtml(icon.value)};"></span>`;
  return ICON.daisy;
}

function renderBranchNoticesHtml(b){
  const notices = branchNotices(b);
  if(!notices.length) return "";
  return `<div class="notices">${notices.map(n=>`<div class="notice-line" style="color:${escapeHtml(n.color||'#5C7A9E')}; font-size:${parseInt(n.fontSize,10)||12}px;">${escapeHtml(n.text)}</div>`).join("")}</div>`;
}

function langToggleHtml(){
  return `
    <div class="lang-toggle" id="langToggle">
      <button data-lang="ar" class="${lang==='ar'?'active':''}">${t('lang_toggle_ar')}</button>
      <button data-lang="en" class="${lang==='en'?'active':''}">${t('lang_toggle_en')}</button>
    </div>
  `;
}

/* =========================================================
   ROOT RENDER / ROUTER
========================================================= */
function render(){
  const app = document.getElementById("app");
  if(view.screen === "home") app.innerHTML = renderHomeScreen();
  else if(view.screen === "branch") app.innerHTML = renderBranchScreen(view.branchId);
  attachHomeEvents();
}

function goHome(){ view = { screen:"home", branchId:null }; render(); }
function goBranch(id){ view = { screen:"branch", branchId:id }; render(); }

/* ---------------- HOME ---------------- */
function renderHomeScreen(){
  const branchesHtml = state.branches.length ? state.branches.map(b => {
    const count = state.products.filter(p=>p.branchId===b.id).length;
    return `<div class="branch-card" data-branch="${b.id}">
      ${renderBranchIconHtml(b)}
      <div class="name">${escapeHtml(b.name)}</div>
      ${renderBranchNoticesHtml(b)}
      <div class="count">${count} ${t('product_word')}</div>
    </div>`;
  }).join("") : `<div class="branch-empty">${t('no_branches_home')}</div>`;

  return `
    <div class="topbar">
      <button class="gear-btn" id="gearBtn" title="${t('control_panel')}">${ICON.gear}</button>
      ${langToggleHtml()}
    </div>
    <div class="hero">
      <div class="hero-eyebrow">${t('hero_eyebrow')}</div>
      <div class="logo-wrap"><img src="${LOGO_SRC}" alt="Puck"></div>
      <h1 class="hero-title">${t('hero_title')}</h1>
    </div>
    <div class="section-label"><span class="line"></span> ${t('branches_section')} <span class="line"></span></div>
    <div class="branch-grid">${branchesHtml}</div>
  `;
}

/* ---------------- BRANCH PRODUCTS ---------------- */
function renderBranchScreen(branchId){
  const branch = state.branches.find(b=>b.id===branchId);
  const products = state.products.filter(p=>p.branchId===branchId);
  const cols = branchColumns(branch);

  const cardsHtml = products.length ? products.map(p => {
    const info = expiryStatus(p);
    let cardClass = "product-card";
    let banner = "";
    if(info.status === "expired"){
      cardClass += " alert-expired";
      banner = `<div class="alert-banner expired">${ICON.warn} ${t('promo_ended')}</div>`;
    }else if(info.status === "near"){
      cardClass += " alert-near";
      banner = `<div class="alert-banner">${ICON.warn} ${t('ends_in')} ${info.days} ${dayWord(info.days)}</div>`;
    }
    return `
    <div class="${cardClass}">
      ${banner}
      <div class="product-media">
        <img src="${p.image || ''}" alt="${escapeHtml(p.name)}">
        <div class="weight-badge">${p.weightValue} ${unitLabel(p.weightUnit)}</div>
        ${session.user ? `<button class="edit-badge-btn" data-quick-edit="${p.id}" title="${t('quick_edit_title')}">${ICON.edit}</button>` : ''}
      </div>
      <div class="product-body">
        <div class="product-name">${escapeHtml(p.name)}</div>
        <div class="date-row">
          <div class="date-box">
            <div class="lbl">${ICON.calendar} ${t('date_start')}</div>
            <div class="val">${String(p.startDay).padStart(2,'0')} ${curMonths()[p.startMonth-1]} ${YEAR}</div>
          </div>
          <div class="date-box">
            <div class="lbl">${ICON.calendar} ${t('date_end')}</div>
            <div class="val">${String(p.endDay).padStart(2,'0')} ${curMonths()[p.endMonth-1]} ${YEAR}</div>
          </div>
        </div>
      </div>
    </div>
  `;
  }).join("") : `<div class="branch-empty">${t('no_products_branch')}</div>`;

  return `
    <div class="topbar">
      <button class="back-btn" id="backBtn">${ICON.back} ${t('back')}</button>
      <div style="display:flex; align-items:center; gap:8px;">
        ${langToggleHtml()}
        <button class="gear-btn" id="gearBtn" title="${t('control_panel')}">${ICON.gear}</button>
      </div>
    </div>
    <div class="products-wrap">
      <div class="branch-title-row">
        <h2>${escapeHtml(branch ? branch.name : "")}</h2>
        ${branch ? renderBranchNoticesHtml(branch) : ''}
        ${(session.user && branch) ? `<button class="notices-edit-link" data-manage-notices-inline="${branch.id}">${ICON.edit} ${t('manage_notices')}</button>` : ''}
      </div>
      <div class="branch-layout-row">
        <div class="layout-choice-row small">
          <div class="layout-opt small ${cols===1?'active':''}" data-branch-cols="1">
            <div class="preview"><div class="bar" style="width:26px;"></div></div>
            <div class="lbl">${t('layout_one_col')}</div>
          </div>
          <div class="layout-opt small ${cols===2?'active':''}" data-branch-cols="2">
            <div class="preview"><div class="bar"></div><div class="bar"></div></div>
            <div class="lbl">${t('layout_two_col')}</div>
          </div>
        </div>
      </div>
      <div class="product-grid cols-${cols}">${cardsHtml}</div>
      ${(session.user && branch) ? `<div style="max-width:900px; margin:18px auto 0; padding:0 20px;"><button class="add-product-tile" data-quick-add-product="${branch.id}">${ICON.plus} ${t('add_new_product')}</button></div>` : ''}
    </div>
  `;
}

function attachHomeEvents(){
  const gearBtn = document.getElementById("gearBtn");
  if(gearBtn) gearBtn.onclick = ()=>{ session.user ? openAdminPanel() : openLoginModal(); };
  const backBtn = document.getElementById("backBtn");
  if(backBtn) backBtn.onclick = goHome;
  document.querySelectorAll(".branch-card").forEach(el=>{
    el.onclick = ()=> goBranch(el.getAttribute("data-branch"));
  });
  document.querySelectorAll("#langToggle [data-lang]").forEach(btn=>{
    btn.onclick = ()=> setLang(btn.getAttribute("data-lang"));
  });
  document.querySelectorAll("[data-branch-cols]").forEach(el=>{
    el.onclick = async ()=>{
      const branch = state.branches.find(b=>b.id===view.branchId);
      if(!branch) return;
      branch.columns = parseInt(el.getAttribute("data-branch-cols"),10);
      await storageSet("puck:branches", state.branches);
      render();
    };
  });
  document.querySelectorAll("[data-quick-edit]").forEach(btn=>{
    btn.onclick = (e)=>{ e.stopPropagation(); openQuickEditProductModal(btn.getAttribute("data-quick-edit")); };
  });
  document.querySelectorAll("[data-manage-notices-inline]").forEach(btn=>{
    btn.onclick = ()=> openBranchNoticesModal(btn.getAttribute("data-manage-notices-inline"));
  });
  document.querySelectorAll("[data-quick-add-product]").forEach(btn=>{
    btn.onclick = ()=> openQuickAddProductModal(btn.getAttribute("data-quick-add-product"));
  });
}

function escapeHtml(str){
  return String(str==null?"":str).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

function monthOptionsHtml(selected){
  return curMonths().map((m,i)=>`<option value="${i+1}" ${selected===i+1?'selected':''}>${m}</option>`).join("");
}
function dayOptionsHtml(selected){
  return Array.from({length:31},(_,i)=>i+1).map(d=>`<option value="${d}" ${selected===d?'selected':''}>${d}</option>`).join("");
}

/* =========================================================
   LOGIN MODAL
========================================================= */
function openLoginModal(){
  const wrap = document.createElement("div");
  wrap.className = "overlay";
  wrap.id = "loginOverlay";
  wrap.innerHTML = `
    <div class="modal">
      <button class="close-x" id="closeLogin">&times;</button>
      <h3>${t('login_title')}</h3>
      <p class="hint">${t('login_hint')}</p>
      <div id="loginError"></div>
      <div class="field"><label>${t('username_label')}</label><input id="loginUser" type="text" autocomplete="off"></div>
      <div class="field"><label>${t('password_label')}</label><input id="loginPass" type="password"></div>
      <button class="btn btn-primary" id="loginSubmit">${t('login_submit')}</button>
    </div>
  `;
  document.body.appendChild(wrap);
  document.getElementById("closeLogin").onclick = ()=> wrap.remove();
  wrap.onclick = (e)=>{ if(e.target === wrap) wrap.remove(); };
  document.getElementById("loginSubmit").onclick = ()=>{
    const u = document.getElementById("loginUser").value.trim();
    const p = document.getElementById("loginPass").value;
    const user = state.users.find(x=>x.username === u && x.password === p);
    const errBox = document.getElementById("loginError");
    if(!user){
      errBox.innerHTML = `<div class="error-msg">${t('login_error')}</div>`;
      return;
    }
    wrap.remove();
    if(user.mustChange){ openForceChangeModal(user); }
    else{ session.user = user; render(); }
  };
}

function openForceChangeModal(user){
  const wrap = document.createElement("div");
  wrap.className = "overlay";
  wrap.innerHTML = `
    <div class="modal">
      <h3>${t('fc_title')}</h3>
      <p class="hint">${t('fc_hint')}</p>
      <div id="fcError"></div>
      <div class="field"><label>${t('new_password_label')}</label><input id="newPass1" type="password"></div>
      <div class="field"><label>${t('confirm_password_label')}</label><input id="newPass2" type="password"></div>
      <button class="btn btn-primary" id="fcSubmit">${t('fc_submit')}</button>
    </div>
  `;
  document.body.appendChild(wrap);
  document.getElementById("fcSubmit").onclick = async ()=>{
    const p1 = document.getElementById("newPass1").value;
    const p2 = document.getElementById("newPass2").value;
    const errBox = document.getElementById("fcError");
    if(!p1 || p1.length < 4){ errBox.innerHTML = `<div class="error-msg">${t('fc_err_short')}</div>`; return; }
    if(p1 !== p2){ errBox.innerHTML = `<div class="error-msg">${t('fc_err_mismatch')}</div>`; return; }
    user.password = p1;
    user.mustChange = false;
    await storageSet("puck:users", state.users);
    wrap.remove();
    session.user = user;
    toast(t('toast_pass_updated'));
    render();
  };
}

/* =========================================================
   ADMIN PANEL
========================================================= */
function openAdminPanel(){
  adminUI.tab = "branches";
  adminUI.selectedBranchForProducts = state.branches[0] ? state.branches[0].id : null;
  renderAdminOverlay();
}

function closeAdminPanel(){
  const el = document.getElementById("adminOverlay");
  if(el) el.remove();
  render();
}

function renderAdminOverlay(){
  let el = document.getElementById("adminOverlay");
  if(!el){
    el = document.createElement("div");
    el.className = "admin-overlay";
    el.id = "adminOverlay";
    document.body.appendChild(el);
  }
  const tabs = [
    {id:"branches", label:t('tab_branches')},
    {id:"products", label:t('tab_products')},
    {id:"users", label:t('tab_users')},
    {id:"appearance", label:t('tab_appearance')},
  ];
  el.innerHTML = `
    <div class="admin-shell">
      <div class="admin-top">
        <h2>${ICON.gear} ${t('admin_title')}</h2>
        <div style="display:flex; gap:8px;">
          <button class="admin-back-btn" id="adminBackBtn">${ICON.back} ${t('admin_back')}</button>
          <button class="logout-btn" id="logoutBtn">${ICON.logout} ${t('logout')}</button>
        </div>
      </div>
      <div class="admin-tabs">
        ${tabs.map(tb=>`<button class="admin-tab ${adminUI.tab===tb.id?'active':''}" data-tab="${tb.id}">${tb.label}</button>`).join("")}
      </div>
      <div class="admin-content" id="adminContent"></div>
    </div>
  `;
  document.getElementById("adminBackBtn").onclick = ()=> closeAdminPanel();
  document.getElementById("logoutBtn").onclick = ()=>{ session.user=null; closeAdminPanel(); };
  el.querySelectorAll(".admin-tab").forEach(b=>{
    b.onclick = ()=>{ adminUI.tab = b.getAttribute("data-tab"); renderAdminOverlay(); };
  });
  document.getElementById("adminContent").innerHTML = renderAdminTab(adminUI.tab);
  attachAdminTabEvents(adminUI.tab);
}

function renderAdminTab(tab){
  if(tab==="branches") return renderBranchesTab();
  if(tab==="products") return renderProductsTab();
  if(tab==="users") return renderUsersTab();
  if(tab==="appearance") return renderAppearanceTab();
  if(tab==="whatsapp") return renderWhatsappTab();
  return "";
}

/* ---------- BRANCHES TAB ---------- */
function renderBranchesTab(){
  const chips = state.branches.map(b=>`
    <div class="chip">
      <span class="daisy" style="width:14px;height:14px;color:var(--sky)">${renderBranchIconHtmlSmall(b)}</span>
      ${escapeHtml(b.name)}
      <button class="chip-mini-btn" data-manage-icon="${b.id}" title="${t('manage_icon')}">🖼</button>
      <button class="chip-mini-btn" data-manage-notices="${b.id}" title="${t('manage_notices')}">🔔</button>
      <button data-del-branch="${b.id}" title="${t('delete_branch_title')}">${ICON.trash}</button>
    </div>
  `).join("");
  return `
    <div class="panel-card">
      <h4>${t('current_branches')}</h4>
      <div class="chip-grid">
        ${chips}
        <button class="plus-tile" id="showAddBranch">${ICON.plus} ${t('add_branch')}</button>
      </div>
      <div class="inline-add-row" id="addBranchRow" style="display:none;">
        <input id="newBranchName" type="text" placeholder="${t('new_branch_placeholder')}">
        <button class="btn btn-primary btn-small" id="confirmAddBranch">${t('add_word')}</button>
      </div>
      <p class="hint" style="margin-top:14px;">${t('branch_delete_hint')}</p>
    </div>
  `;
}
function attachBranchesTabEvents(){
  const showBtn = document.getElementById("showAddBranch");
  if(showBtn) showBtn.onclick = ()=>{ document.getElementById("addBranchRow").style.display="flex"; };
  const confirmBtn = document.getElementById("confirmAddBranch");
  if(confirmBtn) confirmBtn.onclick = async ()=>{
    const nameInput = document.getElementById("newBranchName");
    const name = nameInput.value.trim();
    if(!name){ toast(t('toast_enter_branch_name')); return; }
    state.branches.push({ id: uid(), name, columns: 2, notices: [], icon: { type:"daisy", value:"" } });
    await storageSet("puck:branches", state.branches);
    toast(t('toast_branch_added'));
    renderAdminOverlay();
  };
  document.querySelectorAll("[data-del-branch]").forEach(b=>{
    b.onclick = async ()=>{
      const id = b.getAttribute("data-del-branch");
      if(!confirm(t('confirm_delete_branch'))) return;
      state.branches = state.branches.filter(x=>x.id!==id);
      state.products = state.products.filter(x=>x.branchId!==id);
      await storageSet("puck:branches", state.branches);
      await storageSet("puck:products", state.products);
      toast(t('toast_branch_deleted'));
      renderAdminOverlay();
    };
  });
  document.querySelectorAll("[data-manage-icon]").forEach(b=>{
    b.onclick = ()=> openBranchIconModal(b.getAttribute("data-manage-icon"));
  });
  document.querySelectorAll("[data-manage-notices]").forEach(b=>{
    b.onclick = ()=> openBranchNoticesModal(b.getAttribute("data-manage-notices"));
  });
}

/* ---------- BRANCH ICON MODAL ---------- */
const EMOJI_CHOICES = ["🏬","🛒","🏪","🏢","🧀","🥛","🍞","🥩","🍫","🥫","🍎","🧊","📍","⭐","🔥","🎯","🐼","🌿","💎","🛍"];
const COLOR_CHOICES = ["#3DA5E0","#0B2E6B","#F6A623","#6FBE44","#D64545","#8E5CE0","#E05C9C","#2FB6A8"];

function openBranchIconModal(branchId){
  const branch = state.branches.find(b=>b.id===branchId);
  if(!branch) return;
  let cur = Object.assign({type:"daisy", value:""}, branchIcon(branch));
  let pendingImage = null;

  const wrap = document.createElement("div");
  wrap.className = "overlay";

  function subSectionHtml(){
    if(cur.type === "image"){
      return `
        <div class="field" style="text-align:center;">
          <div class="thumb-upload" style="margin:0 auto;">
            <img id="biImgPreview" src="${cur.value||''}" alt="">
            <input type="file" accept="image/*" id="biImageInput">
            <div class="up-hint">${ICON.upload} ${t('upload_image_word')}</div>
          </div>
        </div>`;
    }
    if(cur.type === "emoji"){
      return `
        <p class="hint" style="margin-bottom:0;">${t('choose_emoji_word')}</p>
        <div class="emoji-grid" id="biEmojiGrid">
          ${EMOJI_CHOICES.map(e=>`<button data-emoji="${e}" class="${cur.value===e?'active':''}" type="button">${e}</button>`).join("")}
        </div>`;
    }
    if(cur.type === "color"){
      return `
        <p class="hint" style="margin-bottom:0;">${t('choose_color_word')}</p>
        <div class="color-swatch-row" id="biColorRow">
          ${COLOR_CHOICES.map(c=>`<button data-color="${c}" class="${cur.value===c?'active':''}" type="button" style="background:${c};"></button>`).join("")}
          <input type="color" id="biCustomColor" value="${cur.value && cur.value.startsWith('#') ? cur.value : '#3DA5E0'}">
        </div>`;
    }
    return `<p class="hint" style="margin-bottom:0;">${ICON.daisy}</p>`;
  }

  function draw(){
    wrap.innerHTML = `
      <div class="modal">
        <button class="close-x" id="closeIcon">&times;</button>
        <h3>${t('icon_modal_title')}</h3>
        <div class="icon-choice-row">
          <button data-itype="daisy" class="${cur.type==='daisy'?'active':''}" type="button">${t('icon_type_default')}</button>
          <button data-itype="image" class="${cur.type==='image'?'active':''}" type="button">${t('icon_type_image')}</button>
          <button data-itype="emoji" class="${cur.type==='emoji'?'active':''}" type="button">${t('icon_type_emoji')}</button>
          <button data-itype="color" class="${cur.type==='color'?'active':''}" type="button">${t('icon_type_color')}</button>
        </div>
        <div id="biSubSection">${subSectionHtml()}</div>
        <button class="btn btn-primary" id="biSaveBtn" style="margin-top:16px;">${t('save_word')}</button>
      </div>

    document.getElementById("closeIcon").onclick = ()=> wrap.remove();

    });
    const imgInput = document.getElementById("biImageInput");
    if(imgInput) imgInput.onchange = (e)=>{
      const file = e.target.files[0];
      if(!file) return;
      compressImageToDataUrl(file, 300).then(dataUrl=>{

      btn.onclick = ()=>{ cur.value = btn.getAttribute("data-emoji"); draw(); };

      const customColor = document.getElementById("biCustomColor");
      if(customColor) customColor.oninput = ()=>{ cur.value = customColor.value; };
    }
    document.getElementById("biSaveBtn").onclick = async ()=>{
      if(cur.type === "image" && pendingImage) cur.value = pendingImage;
      branch.icon = { type: cur.type, value: cur.value || "" };

      wrap.remove();

      renderAdminOverlay();

  document.body.appendChild(wrap);
  draw();

    wrap.querySelectorAll("[data-del-notice]").forEach(btn=>{
      btn.onclick = async ()=>{
        const id = btn.getAttribute("data-del-notice");
        branch.notices = branch.notices.filter(n=>n.id!==id);

/* ---------- ADD PRODUCT: pick from previously added products ---------- */
function getUniquePreviousProducts(){
  // آخر نسخة مضافة لكل اسم منتج (بدون تكرار الاسم)
  const map = new Map();
  state.products.forEach(p=>{
    if(!p.name || !p.name.trim()) return;
    map.set(p.name.trim(), p);
  });
  return Array.from(map.values()).sort((a,b)=> a.name.localeCompare(b.name, 'ar'));
}

function openPreviousProductsModal(){
  const all = getUniquePreviousProducts();
  const picked = new Set();

  const wrap = document.createElement("div");
  wrap.className = "overlay";
  wrap.innerHTML = `
    <div class="modal wide">
      <button class="close-x" id="closePrev">&times;</button>
      <h3>${ICON.search} ${t('prev_modal_title')}</h3>
      <p class="hint">${t('prev_modal_hint')}</p>
      <div class="prev-search">
        <input id="prevSearchInput" type="text" placeholder="${t('search_placeholder')}">
        ${ICON.search}
      </div>
      <div class="prev-list" id="prevList"></div>
      <button class="btn btn-primary" id="prevConfirmBtn">${ICON.plus} ${t('add_selected')} (<span id="prevCount">0</span>)</button>
    </div>
  `;
  document.body.appendChild(wrap);

  function renderList(filter){
    const q = (filter||"").trim().toLowerCase();
    const items = all.filter(p=> !q || p.name.toLowerCase().includes(q));
    const listEl = document.getElementById("prevList");
    listEl.innerHTML = items.length ? items.map(p=>`
      <div class="prev-item">
        <img src="${p.image||''}" alt="">
        <div class="info">
          <div class="n">${escapeHtml(p.name)}</div>
          <div class="w">${p.weightValue||0} ${unitLabel(p.weightUnit)}</div>
        </div>
        <button class="prev-pick-btn ${picked.has(p.id)?'picked':''}" data-pick="${p.id}">${picked.has(p.id) ? ICON.check : ICON.plus}</button>
      </div>
    `).join("") : `<p class="hint">${t('no_matching_results')}</p>`;
    listEl.querySelectorAll("[data-pick]").forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute("data-pick");
        if(picked.has(id)) picked.delete(id); else picked.add(id);
        renderList(document.getElementById("prevSearchInput").value);
        document.getElementById("prevCount").textContent = picked.size;
      };
    });
  }
  renderList("");

  document.getElementById("prevSearchInput").oninput = (e)=> renderList(e.target.value);
  document.getElementById("closePrev").onclick = ()=> wrap.remove();
  wrap.onclick = (e)=>{ if(e.target===wrap) wrap.remove(); };
  document.getElementById("prevConfirmBtn").onclick = async ()=>{
    if(picked.size === 0){ toast(t('toast_select_at_least_one')); return; }
    picked.forEach(id=>{

      if(!src) return;
      state.products.push({

        name: src.name, image: src.image||"",
        weightValue: src.weightValue||0, weightUnit: src.weightUnit||"غ",
        startDay: src.startDay||1, startMonth: src.startMonth||1,
        endDay: src.endDay||28, endMonth: src.endMonth||12,
        alertDays: src.alertDays||7
      });
    });
    await storageSet("puck:products", state.products);
    wrap.remove();
    toast(`${t('toast_added_n_products_prefix')} ${picked.size} ${t('product_word')}`);
    renderAdminOverlay();
  };
}

function compressImageToDataUrl(file, maxDim){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", 0.85));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ---------- WHATSAPP TAB ---------- */
function renderWhatsappTab(){
  const branchName = (id)=> id==="all" ? "كل الفروع" : (state.branches.find(b=>b.id===id)?.name || "—");
  const subsRows = state.subscribers.map(s=>`
    <tr>
      <td>${escapeHtml(s.phone)}</td>
      <td>${escapeHtml(branchName(s.branchId))}</td>
      <td><button class="btn btn-danger btn-small" data-del-sub="${s.id}">${ICON.trash}</button></td>
    </tr>
  `).join("");

  const alertItems = [];
  state.products.forEach(p=>{
    const info = expiryStatus(p);
    if(info.status === "ok") return;
    const branch = state.branches.find(b=>b.id===p.branchId);
    const bName = branch ? branch.name : "—";
    const matchingSubs = state.subscribers.filter(s=>s.branchId==="all" || s.branchId===p.branchId);
    alertItems.push({ p, info, bName, matchingSubs });
  });

  const alertsHtml = alertItems.length ? alertItems.map(item=>{
    const pillClass = item.info.status === "expired" ? "expired" : "near";
    const pillLabel = item.info.status === "expired" ? "منتهي" : `متبقي ${item.info.days} ${item.info.days===1?'يوم':'أيام'}`;
    const sendButtons = item.matchingSubs.length ? item.matchingSubs.map(s=>`
      <button class="wa-send-btn" data-send-phone="${escapeHtml(s.phone)}" data-send-product="${item.p.id}">${ICON.chat} إرسال إلى ${escapeHtml(s.phone)}</button>
    `).join("") : `<span class="hint" style="margin:0;">لا يوجد مشتركون لهذا الفرع بعد</span>`;
    return `
      <div class="alert-item">
        <div class="info"><b>${escapeHtml(item.p.name)}</b> — فرع ${escapeHtml(item.bName)}
          <span class="days-pill ${pillClass}">${pillLabel}</span>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">${sendButtons}</div>
      </div>
    `;
  }).join("") : `<p class="hint">لا توجد منتجات ضمن نطاق التنبيه حاليًا.</p>`;

  return `
    <div class="panel-card">
      <h4>${ICON.warn} منتجات تحتاج تنبيهًا الآن</h4>
      ${alertsHtml}
      <p class="hint" style="margin-top:10px;">الإرسال يتم بضغطة واحدة عبر واتساب ويجب تنفيذه يدويًا من هنا؛ لا يمكن لصفحة الموقع إرسال رسائل تلقائيًا دون فتحها، لأن ذلك يتطلب خادمًا يعمل باستمرار مع اشتراك واتساب بزنس الرسمي.</p>
    </div>
    <div class="panel-card">
      <h4>المشتركون في التنبيهات</h4>
      <table class="wa-subs-table">
        <thead><tr><th>رقم الجوال</th><th>الفرع</th><th></th></tr></thead>
        <tbody>${subsRows || `<tr><td colspan="3" class="hint">لا يوجد مشتركون بعد</td></tr>`}</tbody>
      </table>
      <div class="add-user-form">
        <input id="adminSubPhone" type="text" placeholder="رقم الجوال (مع رمز الدولة)، مثال: 9665xxxxxxxx">
        <select id="adminSubBranch">
          <option value="all">كل الفروع</option>
          ${state.branches.map(b=>`<option value="${b.id}">${escapeHtml(b.name)}</option>`).join("")}
        </select>
        <button class="btn btn-primary btn-small" id="adminAddSubBtn">${ICON.plus} إضافة مشترك</button>
      </div>
    </div>
  `;
}
function attachWhatsappTabEvents(){
  document.querySelectorAll("[data-send-phone]").forEach(btn=>{
    btn.onclick = ()=>{
      const phone = btn.getAttribute("data-send-phone");
      const productId = btn.getAttribute("data-send-product");
      const p = state.products.find(x=>x.id===productId);
      if(!p) return;
      const branch = state.branches.find(b=>b.id===p.branchId);
      const info = expiryStatus(p);
      const msg = buildWaMessage(p, branch ? branch.name : "—", info);
      window.open(waLink(phone, msg), "_blank");
    };
  });
  document.querySelectorAll("[data-del-sub]").forEach(btn=>{
    btn.onclick = async ()=>{
      const id = btn.getAttribute("data-del-sub");
      state.subscribers = state.subscribers.filter(s=>s.id!==id);
      await storageSet("puck:subscribers", state.subscribers);
      toast("تم حذف المشترك");
      renderAdminOverlay();
    };
  });
  const addBtn = document.getElementById("adminAddSubBtn");
  if(addBtn) addBtn.onclick = async ()=>{
    const phone = document.getElementById("adminSubPhone").value.trim();
    const branchId = document.getElementById("adminSubBranch").value;
    if(!phone){ toast("الرجاء إدخال رقم الجوال"); return; }
    state.subscribers.push({ id: uid(), phone, branchId });
    await storageSet("puck:subscribers", state.subscribers);
    toast("تمت إضافة المشترك");
    renderAdminOverlay();
  };
}

/* ---------- QUICK EDIT (from public product card, after login) ---------- */
function openQuickEditProductModal(productId){
  const p = state.products.find(x=>x.id===productId);
  if(!p) return;
  const wrap = document.createElement("div");
  wrap.className = "overlay";
  wrap.innerHTML = `
    <div class="modal">
      <button class="close-x" id="closeQuickEdit">&times;</button>
      <h3>${ICON.edit} ${t('quick_edit_title')}</h3>
      <div class="field"><label>${t('product_name_placeholder')}</label><input id="qeName" type="text" value="${escapeHtml(p.name)}"></div>
      <div class="field">
        <label>${t('image_word')}</label>
        <div class="thumb-upload" style="margin:0 auto;">
          <img id="qeImgPreview" src="${p.image||''}" alt="">
          <input type="file" accept="image/*" id="qeImageInput">
          <div class="up-hint">${ICON.upload} ${t('change_word')}</div>
        </div>
      </div>
      <div class="field">
        <label>${t('weight_label')}</label>
        <div class="weight-inputs">
          <input type="number" min="0" id="qeWeightValue" value="${p.weightValue}">
          <select id="qeWeightUnit">
            <option value="غ" ${p.weightUnit==='غ'?'selected':''}>${t('unit_g')}</option>
            <option value="كغ" ${p.weightUnit==='كغ'?'selected':''}>${t('unit_kg')}</option>
          </select>
        </div>
      </div>
      <div class="date-line" style="margin-bottom:14px; flex-wrap:wrap;">
        <div class="grp"><span>${t('date_start')}</span>
          <select id="qeStartDay">${dayOptionsHtml(p.startDay)}</select>
          <select id="qeStartMonth">${monthOptionsHtml(p.startMonth)}</select>
          <span>${YEAR}</span>
        </div>
        <div class="grp"><span>${t('date_end')}</span>
          <select id="qeEndDay">${dayOptionsHtml(p.endDay)}</select>
          <select id="qeEndMonth">${monthOptionsHtml(p.endMonth)}</select>
          <span>${YEAR}</span>
        </div>
        <div class="grp"><span>${ICON.warn} ${t('alert_before')}</span>
          <input type="number" min="0" max="120" style="width:56px;" id="qeAlertDays" value="${p.alertDays||0}">
          <span>${t('day_word')}</span>
        </div>
      </div>
      <button class="btn btn-primary" id="qeSaveBtn">${t('save_word')}</button>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button class="btn btn-ghost" id="qeCancelBtn" style="flex:1;">${t('cancel_word')}</button>
        <button class="btn btn-danger" id="qeDeleteBtn" style="flex:1;">${ICON.trash} ${t('delete_product')}</button>
      </div>
    </div>
  `;
  document.body.appendChild(wrap);
  document.getElementById("closeQuickEdit").onclick = ()=> wrap.remove();
  document.getElementById("qeCancelBtn").onclick = ()=> wrap.remove();
  wrap.onclick = (e)=>{ if(e.target===wrap) wrap.remove(); };

  document.getElementById("qeDeleteBtn").onclick = async ()=>{
    if(!confirm(t('confirm_delete_product'))) return;
    state.products = state.products.filter(x=>x.id!==productId);
    await storageSet("puck:products", state.products);
    wrap.remove();
    toast(t('toast_product_deleted'));
    render();
  };

  let pendingImage = null;
  document.getElementById("qeImageInput").onchange = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    compressImageToDataUrl(file, 640).then(dataUrl=>{
      pendingImage = dataUrl;
      document.getElementById("qeImgPreview").src = dataUrl;
    });
  };

  document.getElementById("qeSaveBtn").onclick = async ()=>{
    p.name = document.getElementById("qeName").value.trim() || p.name;
    if(pendingImage) p.image = pendingImage;
    p.weightValue = parseInt(document.getElementById("qeWeightValue").value,10) || 0;
    p.weightUnit = document.getElementById("qeWeightUnit").value;
    p.startDay = parseInt(document.getElementById("qeStartDay").value,10);
    p.startMonth = parseInt(document.getElementById("qeStartMonth").value,10);
    p.endDay = parseInt(document.getElementById("qeEndDay").value,10);
    p.endMonth = parseInt(document.getElementById("qeEndMonth").value,10);
    p.alertDays = parseInt(document.getElementById("qeAlertDays").value,10) || 0;
    await storageSet("puck:products", state.products);
    wrap.remove();
    toast(t('toast_change_saved'));
    render();
  };
}

function openSubscribeModal(){
  const branchOpts = state.branches.map(b=>`<option value="${b.id}">${escapeHtml(b.name)}</option>`).join("");
  const wrap = document.createElement("div");
  wrap.className = "overlay";
  wrap.innerHTML = `
    <div class="modal">
      <button class="close-x" id="closeSub">&times;</button>
      <h3>${ICON.chat} ${t('sub_title')}</h3>
      <p class="hint">${t('sub_hint')}</p>
      <div id="subError"></div>
      <div class="field"><label>${t('phone_label')}</label><input id="subPhone" type="text" placeholder="${t('phone_placeholder')}"></div>
      <div class="field"><label>${t('branch_label')}</label>
        <select id="subBranch">
          <option value="all">${t('all_branches')}</option>
          ${branchOpts}
        </select>
      </div>
      <button class="btn btn-primary" id="subSubmit">${ICON.plus} ${t('subscribe_btn')}</button>
    </div>
  `;
  document.body.appendChild(wrap);
  document.getElementById("closeSub").onclick = ()=> wrap.remove();
  wrap.onclick = (e)=>{ if(e.target===wrap) wrap.remove(); };
  document.getElementById("subSubmit").onclick = async ()=>{
    const phone = document.getElementById("subPhone").value.trim();
    const branchId = document.getElementById("subBranch").value;
    const errBox = document.getElementById("subError");
    if(!phone || phone.replace(/[^0-9]/g,"").length < 8){
      errBox.innerHTML = `<div class="error-msg">${t('sub_err_phone')}</div>`;
      return;
    }
    state.subscribers.push({ id: uid(), phone, branchId });
    await storageSet("puck:subscribers", state.subscribers);
    wrap.remove();
    toast(t('toast_subscribed'));
  };
}

function attachAdminTabEvents(tab){
  if(tab==="branches") attachBranchesTabEvents();
  if(tab==="products") attachProductsTabEvents();
  if(tab==="users") attachUsersTabEvents();
  if(tab==="appearance") attachAppearanceTabEvents();
  if(tab==="whatsapp") attachWhatsappTabEvents();
}
